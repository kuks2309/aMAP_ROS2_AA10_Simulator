controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    reference_timeout: 0.5
    front_steering: true
    open_loop: false
    velocity_rolling_window_size: 10
    position_feedback: false
    use_stamped_vel: true
    
    # Robot kinematics
    wheelbase: 0.2  # meters
    wheel_separation: 0.19  # meters
    wheel_radius: 0.035  # meters
    
    # Steering joints
    front_wheel_track: 0.19
    rear_wheel_track: 0.19
    
    # Joint names
    left_wheel_names: ["rear_left_wheel_joint", "front_left_wheel_joint"]
    right_wheel_names: ["rear_right_wheel_joint", "front_right_wheel_joint"]
    
    front_left_wheel_steering_joint: "front_left_steer_joint"
    front_right_wheel_steering_joint: "front_right_steer_joint"
    
    # Odometry
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    publish_rate: 50.0
    enable_odom_tf: true
    
    # Velocity and acceleration limits
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0  # m/s
        min_velocity: -0.5  # m/s
        has_acceleration_limits: true
        max_acceleration: 1.0  # m/s^2
        min_acceleration: -1.0  # m/s^2
        has_jerk_limits: false
        max_jerk: 0.0  # m/s^3
        
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0  # rad/s
        has_acceleration_limits: true
        max_acceleration: 2.0  # rad/s^2
        has_jerk_limits: false
        max_jerk: 0.0  # rad/s^3

joint_state_broadcaster:
  ros__parameters:
    joints:
      - front_steer_joint
      - rear_wheel_joint
      - front_right_steer_joint
      - front_right_wheel_joint
      - front_left_steer_joint
      - front_left_wheel_joint
      - rear_right_wheel_joint
      - rear_left_wheel_joint